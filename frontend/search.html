<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header>
      <div class="wrap top">
        <div class="brand">EventSphere</div>
        <nav>
          <a href="./admin.html">Admin</a> |
          <a href="./search.html">Search</a>
        </nav>
      </div>
    </header>

    <main class="wrap">
      <div class="card">
        <div class="row">
          <b>Search</b>
          <span class="muted">title / org / category</span>
        </div>
        <div class="row" style="margin-top:8px">
          <input id="q" placeholder="query" />
          <input id="cat" placeholder="category" />
          <input id="min" placeholder="min" />
          <input id="max" placeholder="max" />
          <button id="go" class="btn p">Go</button>
        </div>
        <div id="err" class="err"></div>
      </div>

      <div class="card">
        <div class="muted">Results</div>
        <div id="out"></div>
      </div>
    </main>

    <script src="./common.js"></script>
    <script src="./search.js"></script>
  </body>
</html>
