<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header>
      <div class="wrap top">
        <div class="brand">EventSphere</div>
        <nav>
          <a href="./admin.html">Admin</a> |
          <a href="./search.html">Search</a>
        </nav>
      </div>
    </header>

    <main class="wrap">
      <div class="card">
        <div class="row">
          <b>Admin</b>
          <span class="muted">Listings / Orders / Users</span>
          <div class="sp"></div>
          <button id="refresh" class="btn">Refresh</button>
        </div>
        <div id="err" class="err"></div>
        <div class="row" style="margin-top:8px">
          <button id="tList" class="btn p">Listings</button>
          <button id="tOrd" class="btn">Orders</button>
          <button id="tUsr" class="btn">Users</button>
        </div>
      </div>

      <div id="pList" class="card">
        <table>
          <thead><tr><th>ID</th><th>Org</th><th>Title</th><th>Price</th><th></th></tr></thead>
          <tbody id="bList"></tbody>
        </table>
      </div>

      <div id="pOrd" class="card" style="display:none">
        <table>
          <thead><tr><th>Order</th><th>Customer</th><th>Org</th><th>Date</th><th>Status</th><th>Pay</th><th>Total</th></tr></thead>
          <tbody id="bOrd"></tbody>
        </table>
      </div>

      <div id="pUsr" class="card" style="display:none">
        <table>
          <thead><tr><th>ID</th><th>User</th><th>Role</th><th>Status</th><th></th></tr></thead>
          <tbody id="bUsr"></tbody>
        </table>
      </div>
    </main>

    <script src="./common.js"></script>
    <script src="./admin.js"></script>
  </body>
</html>
