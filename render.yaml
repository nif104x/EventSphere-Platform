# Blueprint for https://render.com — optional: connect repo and use "Apply blueprint",
# or copy startCommand / PYTHON_VERSION into an existing Web Service manually.
#
# Root directory in Render UI should be this folder (EventSphere-Platform), or adjust paths.
#
# Start command must bind 0.0.0.0 and $PORT (not 127.0.0.1:8000) or Render cannot route traffic.

services:
  - type: web
    name: eventsphere-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      # Link a Render Postgres instance in the dashboard; Render injects DATABASE_URL.
      # Or set DATABASE_URL manually to the External Connection String from the DB page.
